name: ci
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  test:
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - java: 17
            os: ubuntu-latest
          - java: 17
            os: windows-latest
          - java: 25
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/setup-java@v5
      with:
        java-version: "${{matrix.java}}"
        distribution: temurin
    - uses: actions/checkout@v7
    - uses: coursier/cache-action@v8
    - uses: sbt/setup-sbt@v1
    - shell: bash
      run: sbt -v "+ compile"
